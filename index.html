<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UmiDesk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f; --bg2: #181818; --bg3: #222222; --bg4: #2a2a2a;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f0f0f0; --text2: #888; --text3: #555;
  
  --accent: #ff8a00; 
  --accent-dim: rgba(255, 138, 0, 0.12); 
  --accent-text: #ffffff; 
  
  --red: #ff5c5c; --red-dim: rgba(255,92,92,0.1);
  --yellow: #ffd166; --yellow-dim: rgba(255,209,102,0.1);
  --blue: #5c9eff; --blue-dim: rgba(92,158,255,0.1);
  --green: #5cffa0; --green-dim: rgba(92,255,160,0.1);
  --radius: 10px; --radius-sm: 6px;
  font-family: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

/* Ocultar Valores */
.hide-values .val-money { filter: blur(5px); opacity: 0.7; pointer-events: none; user-select: none; }

/* Layout & Utils */
.shell { display: flex; min-height: 100vh; }
.sidebar { width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; z-index: 1000; transition: transform 0.3s ease; }
.main { flex: 1; overflow: auto; position: relative; width: 100%; }
.sync-badge { position: absolute; top: 12px; right: 36px; font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; z-index: 10; transition: all 0.3s; }
.sync-badge.syncing { color: var(--yellow); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.syncing .sync-dot { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0% { opacity: .5; } 50% { opacity: 1; } 100% { opacity: .5; } }

/* Sidebar & Mobile Overlay */
.logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
.logo-mark { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
.logo-mark span { color: var(--accent); }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 400; transition: all .15s; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.nav-section { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; padding: 16px 10px 6px; font-family: 'DM Mono', monospace; }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }

/* Mobile Header */
.mobile-header { display: none; background: var(--bg2); padding: 16px 20px; border-bottom: 1px solid var(--border); align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 900; }
.mobile-header-logo { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
.mobile-header-logo span { color: var(--accent); }
.mobile-menu-btn { background: none; border: none; color: var(--text); padding: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.mobile-menu-btn svg { width: 24px; height: 24px; }
.sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 990; backdrop-filter: blur(2px); transition: opacity 0.3s; opacity: 0; pointer-events: none; }

/* Pages */
.page { display: none; padding: 32px 36px; }
.page.active { display: block; }
.page-header { margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-start; }
.page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.page-title-home { font-size: 26px; font-weight: 500; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
.page-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }

/* Cards & Grid */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
.home-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; font-family: 'DM Mono', monospace; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.stat-val { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; letter-spacing: -1px; }
.val-accent { color: var(--accent); } .val-green { color: var(--green); } .val-red { color: var(--red); } .val-blue { color: var(--blue); } .val-yellow { color: var(--yellow); }

/* UI Elements */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg3); color: var(--text); cursor: pointer; font-size: 13px; transition: all .15s; justify-content: center;}
.btn:hover { background: var(--bg4); border-color: var(--border2); }
.btn-accent { background: var(--accent); color: var(--accent-text); border-color: transparent; font-weight: 600; }
.btn-accent:hover { opacity: 0.9; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-danger { background: transparent; border-color: transparent; color: var(--red); }
.btn-danger:hover { background: var(--red-dim); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Forms & Tables */
input, select, textarea { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; width: 100%; transition: border .15s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; font-family: 'DM Mono', monospace; }
.form-group { margin-bottom: 14px; }
.form-row { display: grid; gap: 12px; } .form-row-2 { grid-template-columns: 1fr 1fr; } .form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
.table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; background: var(--bg2); white-space: nowrap; }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 13px; }
.chip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px 2px 5px; border-radius: 20px; font-size: 11px; background: var(--bg4); border: 1px solid var(--border); white-space: nowrap; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge::before { content:''; width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.badge-green { background: var(--green-dim); color: var(--green); } .badge-green::before { background: var(--green); }
.badge-red { background: var(--red-dim); color: var(--red); } .badge-red::before { background: var(--red); }
.badge-yellow { background: var(--yellow-dim); color: var(--yellow); } .badge-yellow::before { background: var(--yellow); }
.badge-gray { background: rgba(255,255,255,0.06); color: var(--text2); } .badge-gray::before { background: var(--text3); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }

/* Modals */
.modal-overlay, .modal-overlay-quick { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(3px); }
.modal-overlay-quick { z-index: 3000; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; padding: 28px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal-sm { width: 400px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.modal-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.modal-footer { display: flex; justify-content: space-between; gap: 8px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }

/* Kanban / Demandas */
.kanban-wrap { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; align-items: flex-start; -webkit-overflow-scrolling: touch; }
.kanban-col { min-width: 270px; width: 270px; flex-shrink: 0; }
.kanban-col-head { display: flex; justify-content: space-between; padding: 0 2px 12px; }
.kanban-col-title { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text2); font-family: 'DM Mono', monospace; }
.kanban-cards { display: flex; flex-direction: column; gap: 10px; min-height: 80px; }
.kanban-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: transform .12s; border-left: 3px solid transparent; }
.kanban-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.kanban-card.atrasado { border-left-color: var(--red); background: linear-gradient(90deg, var(--red-dim) 0%, transparent 100%); }
.kanban-card.hoje { border-left-color: var(--yellow); }
.kanban-card-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; }

/* Ações do Kanban (Setinhas) */
.kanban-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.kanban-card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .12s; }
.kanban-card:hover .kanban-card-actions { opacity: 1; }
.kanban-move-btn { background: var(--bg4); border: 1px solid var(--border); color: var(--text2); padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: all .12s; }
.kanban-move-btn:hover { background: var(--bg3); border-color: var(--accent); color: var(--accent); }

/* Sections */
.section-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; height: 100%; }
.section-box-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;}
.quick-add-wrap { display: flex; gap: 8px; }
.quick-add-btn { background: var(--bg4); border: 1px solid var(--border); color: var(--text); border-radius: 6px; width: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;}
.quick-add-btn:hover { background: var(--bg3); color: var(--accent); }

/* Custom Chart CSS */
.chart-container { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; height: 160px; padding: 30px 20px 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 28px;}
.chart-col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; height: 100%; position: relative; }
.chart-bar { width: 100%; background: var(--bg4); border-radius: 4px 4px 0 0; transition: height 0.5s ease, background 0.3s; position: relative; }
.chart-col:last-child .chart-bar { background: var(--accent); }
.chart-bar:hover { filter: brightness(1.2); }
.chart-val { position: absolute; top: -20px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text); white-space: nowrap; }
.chart-label { margin-top: 8px; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; }

/* Calendar Iframe */
.iframe-container { position: relative; width: 100%; height: calc(100vh - 180px); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); background: var(--bg2); }
.iframe-container iframe { width: 100%; height: 100%; border: none; }

/* ==========================================================
   RESPONSIVIDADE (MOBILE)
========================================================== */
@media (max-width: 768px) {
  .mobile-header { display: flex; }
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; }
  
  .page { padding: 24px 20px; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
  .page-header .btn { width: 100%; }
  
  .stat-grid { grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px;}
  .home-grid { grid-template-columns: 1fr !important; gap: 16px; }
  
  .form-row-2, .form-row-3 { grid-template-columns: 1fr; gap: 0; }
  
  table { min-width: 650px; } 
  
  .modal { padding: 20px; width: 92vw; }
  .modal-header { margin-bottom: 16px; }
  .modal-footer { flex-direction: column; gap: 10px; margin-top: 16px; padding-top: 16px;}
  .modal-footer > div { flex-direction: column; width: 100%; }
  .modal-footer .btn { width: 100%; margin: 0 !important; }
  
  .sync-badge { top: auto; bottom: 16px; right: 16px; background: var(--bg3); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
  
  .chart-container { height: 130px; padding: 20px 10px 10px; gap: 6px; margin-bottom: 20px;}
  .chart-val { font-size: 9px; top: -16px; }
  .chart-label { font-size: 9px; margin-top: 6px;}

  .kanban-card-actions { opacity: 1; }
  .kanban-move-btn { padding: 6px 12px; font-size: 14px; background: var(--bg3); }
}
</style>
</head>
<body>

<div class="shell">

  <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">Umi<span>Desk</span></div>
      <div class="logo-sub">sistema de gestão</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Visão Geral</div>
      <button class="nav-item active" onclick="goPage('home',this)">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        Home
      </button>
      <button class="nav-item" onclick="goPage('financeiro_dash',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14h12M4 10v4M8 6v8M12 2v12"/></svg>
        Dashboard Financeiro
      </button>
      
      <div class="nav-section">Operacional</div>
      <button class="nav-item" onclick="goPage('calendario',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        Calendário
      </button>
      <button class="nav-item" onclick="goPage('kanban',this)">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="4" height="14" rx="1.5"/><rect x="6" y="1" width="4" height="9" rx="1.5"/><rect x="11" y="1" width="4" height="11" rx="1.5"/></svg>
        Demandas
      </button>
      
      <div class="nav-section">Gestão</div>
      <button class="nav-item" onclick="goPage('financeiro',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1v14M4 4h5.5a2.5 2.5 0 010 5H4m0 0h5a2.5 2.5 0 010 5H4"/></svg>
        Lançamentos
      </button>
      <button class="nav-item" onclick="goPage('clientes',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="3"/><path d="M1 14c0-3 2-5 5-5s5 2 5 5"/><path d="M11 7c1.5 0 4 .8 4 4"/><circle cx="11" cy="4" r="2"/></svg>
        Clientes
      </button>
      <button class="nav-item" onclick="goPage('servicos',this)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="2"/><path d="M5 7h6M5 10h4"/></svg>
        Serviços
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" style="width:100%; justify-content:center" id="btn-hide" onclick="toggleHideValues()">🙈 Ocultar Valores</button>
    </div>
  </aside>

  <main class="main">
    
    <div class="mobile-header">
      <div class="mobile-header-logo">Umi<span>Desk</span></div>
      <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
    </div>

    <div id="sync-status" class="sync-badge"><div class="sync-dot"></div>Sincronizado</div>

    <div id="error-container" style="display:none; padding: 32px; color: var(--red); line-height: 1.6;"></div>
