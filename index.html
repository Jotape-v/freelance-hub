<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelance Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --bg5: #2a2a2a;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --text: #f2f0ed;
  --text2: #888;
  --text3: #4a4a4a;
  --accent: #ff6b1a;
  --accent2: #ff8c45;
  --accent-dim: rgba(255,107,26,0.12);
  --red: #ff4d4d;
  --red-dim: rgba(255,77,77,0.1);
  --yellow: #ffb347;
  --yellow-dim: rgba(255,179,71,0.1);
  --blue: #5b9cf6;
  --blue-dim: rgba(91,156,246,0.1);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.1);
  --r: 10px;
  --r-sm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px}

.shell{display:flex;min-height:100vh}
.sidebar{width:224px;min-width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;overflow:auto;min-width:0}

.logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.logo-mark{font-size:17px;font-weight:700;letter-spacing:-.3px}
.logo-mark span{color:var(--accent)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace;letter-spacing:.04em}
.nav{padding:14px 10px;flex:1}
.nav-section{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:14px 10px 5px;font-family:'DM Mono',monospace}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;color:var(--text2);font-size:12.5px;font-weight:500;transition:all .12s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-item svg{width:14px;height:14px;flex-shrink:0}
.nav-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:auto;font-family:'DM Mono',monospace}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.mini-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.mini-label{font-size:10px;color:var(--text3)}
.mini-val{font-size:11px;font-family:'DM Mono',monospace;font-weight:500}
.mini-val.green{color:var(--green)}.mini-val.red{color:var(--red)}.mini-val.accent{color:var(--accent)}

.alert-banner{border-bottom:1px solid rgba(255,77,77,.2);padding:9px 36px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--red);background:rgba(255,77,77,.06)}
.alert-banner.warn{background:rgba(255,179,71,.06);border-bottom-color:rgba(255,179,71,.2);color:var(--yellow)}
.alert-items{display:flex;flex-wrap:wrap;gap:5px;margin-left:2px}
.alert-chip{padding:2px 8px;border-radius:20px;font-size:11px;cursor:pointer;background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.2);color:var(--red)}
.alert-chip.warn{background:rgba(255,179,71,.1);border-color:rgba(255,179,71,.2);color:var(--yellow)}

.page{display:none;padding:28px 36px}
.page.active{display:block}
.page-header{margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.page-title{font-size:21px;font-weight:700;letter-spacing:-.4px}
.page-sub{font-size:12px;color:var(--text2);margin-top:3px}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;margin-bottom:7px}
.stat-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-1px}
.stat-val.accent{color:var(--accent)}.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.blue{color:var(--blue)}
.stat-sub{font-size:10px;color:var(--text3);margin-top:4px}

.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;font-size:12.5px;font-family:'Syne',sans-serif;font-weight:500;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg4)}
.btn-accent{background:var(--accent);color:#fff;border-color:transparent;font-weight:600}
.btn-accent:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:transparent;border-color:transparent;color:var(--red)}
.btn-danger:hover{background:var(--red-dim)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn svg{width:13px;height:13px}

input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--r-sm);padding:8px 11px;font-size:13px;font-family:'Syne',sans-serif;width:100%;transition:border .12s}
input:focus,select:focus,textarea:focus{outline:none;border-color:rgba(255,107,26,.4)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:70px;line-height:1.5}
label{font-size:10px;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace}
.form-group{margin-bottom:13px}
.form-row{display:grid;gap:10px}
.f2{grid-template-columns:1fr 1fr}
.f3{grid-template-columns:1fr 1fr 1fr}
input[type=color]{width:100%;height:36px;padding:3px;cursor:pointer}
input[type=checkbox]{width:auto;accent-color:var(--accent)}

.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text);font-size:12.5px}
tr:last-child td{border-bottom:none}
.grow:hover td{background:rgba(255,255,255,.015);cursor:pointer}

.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.b-green{background:var(--green-dim);color:var(--green)}.b-green::before{background:var(--green)}
.b-yellow{background:var(--yellow-dim);color:var(--yellow)}.b-yellow::before{background:var(--yellow)}
.b-red{background:var(--red-dim);color:var(--red)}.b-red::before{background:var(--red)}
.b-blue{background:var(--blue-dim);color:var(--blue)}.b-blue::before{background:var(--blue)}
.b-accent{background:var(--accent-dim);color:var(--accent)}.b-accent::before{background:var(--accent)}
.b-gray{background:rgba(255,255,255,.06);color:var(--text2)}.b-gray::before{background:var(--text3)}

.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px 2px 4px;border-radius:20px;font-size:11px;background:var(--bg4);border:1px solid var(--border)}
.chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.xbtn{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:3px;background:var(--bg4);transition:transform .18s}
.xbtn.open{transform:rotate(90deg)}
.xbtn svg{width:9px;height:9px;color:var(--text3)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:26px;width:540px;max-width:96vw;max-height:92vh;overflow-y:auto}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.divider{height:1px;background:var(--border);margin:14px 0}

.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;align-items:flex-start}
.kcol{min-width:264px;width:264px;flex-shrink:0}
.kcol-hd{display:flex;align-items:center;justify-content:space-between;padding:0 2px 10px}
.kcol-title{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);font-family:'DM Mono',monospace}
.kcol-dot{width:7px;height:7px;border-radius:50%}
.kcol-n{background:var(--bg3);border:1px solid var(--border);color:var(--text3);width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:10px}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;cursor:pointer;transition:border-color .12s,transform .1s;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kcard.urgente::before{background:var(--red)}
.kcard.normal::before{background:var(--accent)}
.kcard.baixa::before{background:var(--text3)}
.kcard:hover{border-color:var(--border2);transform:translateY(-1px)}
.kcard-title{font-size:12.5px;font-weight:600;margin-bottom:7px;line-height:1.4}
.kcard-desc{font-size:11.5px;color:var(--text2);line-height:1.5;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kcard-ft{display:flex;align-items:center;justify-content:space-between;gap:5px}
.kdate{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.kdate.late{color:var(--red)}.kdate.soon{color:var(--yellow)}
.kactions{display:flex;gap:3px;opacity:0;transition:opacity .1s}
.kcard:hover .kactions{opacity:1}
.kmove{background:var(--bg4);border:1px solid var(--border);color:var(--text2);padding:2px 6px;border-radius:3px;font-size:10px;cursor:pointer;transition:all .1s}
.kmove:hover{border-color:var(--accent);color:var(--accent)}
.kadd{display:flex;align-items:center;gap:5px;padding:7px 9px;border-radius:var(--r-sm);color:var(--text3);font-size:11.5px;cursor:pointer;border:1px dashed var(--border);background:transparent;width:100%;margin-top:6px;transition:all .12s;font-family:'Syne',sans-serif}
.kadd:hover{border-color:var(--border2);color:var(--text2);background:var(--bg3)}

.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.ccard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .12s}
.ccard:hover{border-color:var(--border2)}
.ccard-top{padding:16px 18px;border-bottom:1px solid var(--border)}
.ccard-name{font-size:14px;font-weight:700;margin-bottom:6px}
.ccard-body{padding:14px 18px;display:flex;flex-direction:column;gap:7px}
.ccard-row{display:flex;align-items:flex-start;gap:8px;font-size:12px}
.crow-label{color:var(--text3);min-width:58px;font-family:'DM Mono',monospace;font-size:10px;padding-top:1px;flex-shrink:0}
.crow-val{color:var(--text2);line-height:1.5;word-break:break-word}
.crow-val a{color:var(--accent);text-decoration:none}
.crow-val a:hover{text-decoration:underline}
.ccard-ft{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:6px}
.contract-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(255,107,26,.2)}
.contract-badge.paused{background:rgba(255,255,255,.04);color:var(--text3);border-color:var(--border)}

.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.sbox-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sbox-title{font-size:12.5px;font-weight:600}
.empty-state{text-align:center;padding:32px 20px;color:var(--text3);font-size:12px}

.linked-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;background:var(--accent-dim);border:1px solid rgba(255,107,26,.2);border-radius:4px;font-size:10px;color:var(--accent);font-family:'DM Mono',monospace;cursor:pointer}
.linked-badge:hover{background:rgba(255,107,26,.2)}
</style>
</head>
<body>

<div class="shell">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">Freelance<span>Hub</span></div>
    <div class="logo-sub">gestão criativa</div>
  </div>
  <nav class="nav">
    <div class="nav-section">Visão Geral</div>
    <button class="nav-item active" onclick="goPage('dashboard',this)">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      Dashboard
    </button>
    <div class="nav-section">Trabalho</div>
    <button class="nav-item" onclick="goPage('kanban',this)" id="nav-kanban">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="4" height="14" rx="1.5"/><rect x="6" y="1" width="4" height="9" rx="1.5"/><rect x="11" y="1" width="4" height="11" rx="1.5"/></svg>
      Demandas
    </button>
    <div class="nav-section">Financeiro</div>
    <button class="nav-item" onclick="goPage('financeiro',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1v14M4 4h5.5a2.5 2.5 0 010 5H4m0 0h5a2.5 2.5 0 010 5H4"/></svg>
      Lançamentos
    </button>
    <div class="nav-section">Clientes</div>
    <button class="nav-item" onclick="goPage('clientes',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="3"/><path d="M1 14c0-3 2-5 5-5s5 2 5 5"/><path d="M11 7c1.5 0 4 .8 4 4"/><circle cx="11" cy="4" r="2"/></svg>
      Clientes
    </button>
    <button class="nav-item" onclick="goPage('servicos',this)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="2"/><path d="M5 7h6M5 10h4"/></svg>
      Serviços
    </button>
  </nav>
  <div class="sidebar-footer">
    <div id="sidebar-mini"></div>
  </div>
</aside>

<main class="main">
  <div id="alert-area"></div>

  <div class="page active" id="page-dashboard">
    <div class="page-header">
      <div><div class="page-title">Dashboard</div><div class="page-sub" id="dash-date"></div></div>
    </div>
    <div class="stat-grid" id="dash-stats"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="sbox">
        <div class="sbox-hd"><span class="sbox-title">Contratos mensais</span><button class="btn btn-ghost btn-sm" onclick="goPage('clientes',document.querySelectorAll('.nav-item')[3])">Ver →</button></div>
        <div id="dash-contracts"></div>
      </div>
      <div class="sbox">
        <div class="sbox-hd"><span class="sbox-title">A receber por cliente</span><button class="btn btn-ghost btn-sm" onclick="goPage('financeiro',document.querySelectorAll('.nav-item')[2])">Ver →</button></div>
        <div id="dash-receivables"></div>
      </div>
    </div>
    <div class="sbox">
      <div class="sbox-hd"><span class="sbox-title">Demandas em aberto</span><button class="btn btn-ghost btn-sm" onclick="goPage('kanban',document.querySelectorAll('.nav-item')[1])">Ver kanban →</button></div>
      <div id="dash-demands"></div>
    </div>
  </div>

  <div class="page" id="page-kanban">
    <div class="page-header">
      <div><div class="page-title">Demandas</div><div class="page-sub">Acompanhe suas entregas</div></div>
      <button class="btn btn-accent" onclick="openDemandModal()">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a1 1 0 011 1v5h5a1 1 0 110 2H9v5a1 1 0 11-2 0V9H2a1 1 0 110-2h5V2a1 1 0 011-1z"/></svg>
        Nova Demanda
      </button>
    </div>
    <div class="kanban" id="kanban-board"></div>
  </div>

  <div class="page" id="page-financeiro">
    <div class="page-header">
      <div><div class="page-title">Lançamentos</div><div class="page-sub">Serviços avulsos e pagamentos</div></div>
      <button class="btn btn-accent" onclick="openEntryModal()">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a1 1 0 011 1v5h5a1 1 0 110 2H9v5a1 1 0 11-2 0V9H2a1 1 0 110-2h5V2a1 1 0 011-1z"/></svg>
        Novo Lançamento
      </button>
    </div>
    <div class="stat-grid" id="fin-stats"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <select id="filter-client" onchange="renderFinanceiro()" style="width:175px"></select>
      <select id="filter-status" onchange="renderFinanceiro()" style="width:150px">
        <option value="">Todos status</option>
        <option value="pendente">Pendente</option>
        <option value="recebido">Recebido</option>
      </select>
    </div>
    <div id="entries-table"></div>
  </div>

  <div class="page" id="page-clientes">
    <div class="page-header">
      <div><div class="page-title">Clientes</div><div class="page-sub">Fichas, contratos e preços personalizados</div></div>
      <button class="btn btn-accent" onclick="openClientModal()">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a1 1 0 011 1v5h5a1 1 0 110 2H9v5a1 1 0 11-2 0V9H2a1 1 0 110-2h5V2a1 1 0 011-1z"/></svg>
        Novo Cliente
      </button>
    </div>
    <div id="clients-grid"></div>
  </div>

  <div class="page" id="page-servicos">
    <div class="page-header">
      <div><div class="page-title">Serviços</div><div class="page-sub">Tipos e preços padrão</div></div>
      <button class="btn btn-accent" onclick="openServiceModal()">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a1 1 0 011 1v5h5a1 1 0 110 2H9v5a1 1 0 11-2 0V9H2a1 1 0 110-2h5V2a1 1 0 011-1z"/></svg>
        Novo Serviço
      </button>
    </div>
    <div id="services-list"></div>
  </div>
</main>
</div>

<div id="modal-container"></div>

<script>
let S={
  clients:[
    {id:1,name:'Empresa A',color:'#ff6b1a',email:'',phone:'',briefing:'',links:'',notes:'',contract:false,contractValue:0,contractStatus:'ativo'},

  ],
  entries:[

    {id:2,clientId:2,serviceId:1,qty:2,price:30,status:'pendente',date:'2025-03-18',desc:''},
    {id:3,clientId:1,serviceId:2,qty:1,price:120,status:'pendente',date:'2025-03-20',desc:'Reel produto'},
  ],
  demands:[
    {id:1,clientId:1,title:'Identidade Visual',desc:'Logo + paleta + tipografia',status:'em_andamento',priority:'urgente',due:'2026-04-05',entryIds:[]},
    {id:2,clientId:2,title:'Pack Artes Stories',desc:'10 artes para stories',status:'a_fazer',priority:'normal',due:'2026-04-28',entryIds:[]},
    {id:3,clientId:1,title:'Vídeo institucional',desc:'2 min, roteiro incluso',status:'revisao',priority:'normal',due:'2026-04-10',entryIds:[3]},
  ],
  clientPrices:[],nextId:30
};
let expanded={};

function save(){try{localStorage.setItem('flhub3',JSON.stringify(S))}catch(e){}}
function load(){try{const d=localStorage.getItem('flhub3');if(d){S=JSON.parse(d);['clientPrices','demands'].forEach(k=>{if(!S[k])S[k]=[]});S.clients.forEach(c=>{['contract','contractValue','contractStatus','briefing','links','notes','email','phone'].forEach(k=>{if(c[k]===undefined)c[k]=k==='contract'?false:k==='contractValue'?0:k==='contractStatus'?'ativo':''});});}}catch(e){}}
load();

const gc=id=>S.clients.find(c=>c.id===id)||{name:'—',color:'#555'};
const gs=id=>S.services.find(s=>s.id===id)||{name:'—',price:0};
const gd=id=>S.demands.find(d=>d.id===id)||null;
const uid=()=>S.nextId++;
const fmt=v=>'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
function daysUntil(ds){if(!ds)return null;const d=new Date(ds+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.round((d-n)/86400000);}

function renderAlerts(){
  const area=document.getElementById('alert-area');
  const late=S.demands.filter(d=>d.status!=='concluido'&&d.due&&daysUntil(d.due)<0);
  const soon=S.demands.filter(d=>d.status!=='concluido'&&d.due&&daysUntil(d.due)>=0&&daysUntil(d.due)<=3);
  let html='';
  if(late.length)html+=`<div class="alert-banner"><span>⚠ ${late.length} entrega${late.length>1?'s':''} atrasada${late.length>1?'s':''}:</span><div class="alert-items">${late.map(d=>`<span class="alert-chip" onclick="goPage('kanban',document.querySelectorAll('.nav-item')[1])">${d.title}</span>`).join('')}</div></div>`;
  if(soon.length)html+=`<div class="alert-banner warn"><span>⏰ Vence em breve:</span><div class="alert-items">${soon.map(d=>{const dy=daysUntil(d.due);return`<span class="alert-chip warn" onclick="goPage('kanban',document.querySelectorAll('.nav-item')[1])">${d.title} (${dy===0?'hoje':dy+'d'})</span>`}).join('')}</div></div>`;
  area.innerHTML=html;
  const nb=document.getElementById('nav-kanban');
  const tot=late.length+soon.length;
  const ex=nb.querySelector('.nav-badge');if(ex)ex.remove();
  if(tot>0){const b=document.createElement('span');b.className='nav-badge';b.textContent=tot;nb.appendChild(b);}
}

function goPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(el)el.classList.add('active');
  renderPage(name);
}
function renderPage(n){
  if(n==='dashboard')renderDashboard();
  if(n==='kanban')renderKanban();
  if(n==='financeiro')renderFinanceiro();
  if(n==='clientes')renderClientes();
  if(n==='servicos')renderServicos();
}

function renderDashboard(){
  const now=new Date();
  document.getElementById('dash-date').textContent=now.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const total=S.entries.reduce((s,e)=>s+e.price*e.qty,0);
  const rec=S.entries.filter(e=>e.status==='recebido').reduce((s,e)=>s+e.price*e.qty,0);
  const pend=total-rec;
  const mrr=S.clients.filter(c=>c.contract&&c.contractStatus==='ativo').reduce((s,c)=>s+(c.contractValue||0),0);
  const open=S.demands.filter(d=>d.status!=='concluido').length;
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">MRR — Contratos</div><div class="stat-val accent">${fmt(mrr)}</div><div class="stat-sub">${S.clients.filter(c=>c.contract&&c.contractStatus==='ativo').length} cliente${S.clients.filter(c=>c.contract&&c.contractStatus==='ativo').length!==1?'s':''} ativo${S.clients.filter(c=>c.contract&&c.contractStatus==='ativo').length!==1?'s':''}</div></div>
    <div class="stat-card"><div class="stat-label">Recebido (avulso)</div><div class="stat-val green">${fmt(rec)}</div></div>
    <div class="stat-card"><div class="stat-label">A receber</div><div class="stat-val red">${fmt(pend)}</div></div>
    <div class="stat-card"><div class="stat-label">Demandas abertas</div><div class="stat-val blue">${open}</div></div>`;

  const contracts=S.clients.filter(c=>c.contract);
  document.getElementById('dash-contracts').innerHTML=contracts.length?`<table><tbody>${contracts.map(c=>`<tr>
    <td><span class="chip"><span class="chip-dot" style="background:${c.color}"></span>${c.name}</span></td>
    <td><span class="contract-badge ${c.contractStatus==='ativo'?'':'paused'}">${c.contractStatus==='ativo'?'● Ativo':'○ Pausado'}</span></td>
    <td style="font-family:'DM Mono',monospace;font-size:12px;text-align:right;color:var(--accent)">${fmt(c.contractValue||0)}<span style="font-size:9px;color:var(--text3)">/mês</span></td>
  </tr>`).join('')}</tbody></table>`:'<div class="empty-state">Nenhum contrato mensal.<br>Edite um cliente para ativar.</div>';

  const byC=S.clients.map(c=>({...c,pend:S.entries.filter(e=>e.clientId===c.id&&e.status==='pendente').reduce((s,e)=>s+e.price*e.qty,0)})).filter(c=>c.pend>0).sort((a,b)=>b.pend-a.pend);
  document.getElementById('dash-receivables').innerHTML=byC.length?`<table><tbody>${byC.map(c=>`<tr>
    <td><span class="chip"><span class="chip-dot" style="background:${c.color}"></span>${c.name}</span></td>
    <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--red)">${fmt(c.pend)}</td>
  </tr>`).join('')}</tbody></table>`:'<div class="empty-state">Tudo recebido! 🎉</div>';

  const openD=S.demands.filter(d=>d.status!=='concluido').sort((a,b)=>(a.due||'9').localeCompare(b.due||'9'));
  const colLabel={a_fazer:'A Fazer',em_andamento:'Em Andamento',revisao:'Revisão'};
  document.getElementById('dash-demands').innerHTML=openD.length?`<table><tbody>${openD.map(d=>{
    const c=gc(d.clientId);const dy=daysUntil(d.due);
    const dc=dy===null?'':(dy<0?'late':dy<=3?'soon':'');
    return`<tr><td style="padding:10px 14px">
      <div style="font-size:12.5px;font-weight:600;margin-bottom:3px">${d.title}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <span class="chip"><span class="chip-dot" style="background:${c.color}"></span>${c.name}</span>
        ${d.due?`<span class="kdate ${dc}" style="font-size:10px">${dy<0?`⚠ ${Math.abs(dy)}d atrasado`:dy===0?'⏰ hoje':dy<=3?`⏰ ${dy}d`:'📅 '+d.due}</span>`:''}
      </div>
    </td><td style="padding:10px 14px;text-align:right"><span class="badge b-gray">${colLabel[d.status]||d.status}</span></td></tr>`;
  }).join('')}</tbody></table>`:'<div class="empty-state">Nenhuma demanda aberta 🎉</div>';
  renderSidebar();renderAlerts();
}

function renderSidebar(){
  const rec=S.entries.filter(e=>e.status==='recebido').reduce((s,e)=>s+e.price*e.qty,0);
  const pend=S.entries.filter(e=>e.status==='pendente').reduce((s,e)=>s+e.price*e.qty,0);
  const mrr=S.clients.filter(c=>c.contract&&c.contractStatus==='ativo').reduce((s,c)=>s+(c.contractValue||0),0);
  document.getElementById('sidebar-mini').innerHTML=`
    <div class="mini-row"><span class="mini-label">MRR</span><span class="mini-val accent">${fmt(mrr)}</span></div>
    <div class="mini-row"><span class="mini-label">Recebido</span><span class="mini-val green">${fmt(rec)}</span></div>
    <div class="mini-row"><span class="mini-label">A receber</span><span class="mini-val red">${fmt(pend)}</span></div>`;
}

const COLS=[
  {key:'a_fazer',label:'A Fazer',color:'#4a4a4a'},
  {key:'em_andamento',label:'Em Andamento',color:'#5b9cf6'},
  {key:'revisao',label:'Revisão',color:'#ffb347'},
  {key:'concluido',label:'Concluído',color:'#4ade80'},
];

function renderKanban(){
  document.getElementById('kanban-board').innerHTML=COLS.map(col=>{
    const cards=S.demands.filter(d=>d.status===col.key);
    return`<div class="kcol">
      <div class="kcol-hd"><span class="kcol-title"><span class="kcol-dot" style="background:${col.color}"></span>${col.label}<span class="kcol-n">${cards.length}</span></span></div>
      <div style="display:flex;flex-direction:column;gap:9px">${cards.map(d=>kcard(d,col.key)).join('')}</div>
      <button class="kadd" onclick="openDemandModal(null,'${col.key}')">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a1 1 0 011 1v5h5a1 1 0 110 2H9v5a1 1 0 11-2 0V9H2a1 1 0 110-2h5V2a1 1 0 011-1z"/></svg>
        Adicionar
      </button>
    </div>`;
  }).join('');
  renderAlerts();
}

function kcard(d,colKey){
  const c=gc(d.clientId);
  const linked=d.entryIds&&d.entryIds.length;
  const lTotal=linked?d.entryIds.reduce((s,eid)=>{const e=S.entries.find(x=>x.id===eid);return s+(e?e.price*e.qty:0)},0):0;
  const ci=COLS.findIndex(c=>c.key===colKey);
  const dy=daysUntil(d.due);
  const dc=dy===null?'':(dy<0?'late':dy<=3?'soon':'');
  return`<div class="kcard ${d.priority||'normal'}" onclick="openDemandDetail(${d.id})">
    <div class="kcard-title">${d.title}</div>
    ${d.desc?`<div class="kcard-desc">${d.desc}</div>`:''}
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
      <span class="chip"><span class="chip-dot" style="background:${c.color}"></span>${c.name}</span>
      ${linked?`<span class="linked-badge" onclick="event.stopPropagation()">⬡ ${fmt(lTotal)}</span>`:''}
    </div>
    <div class="kcard-ft">
      ${d.due?`<span class="kdate ${dc}">${dy<0?`⚠ ${Math.abs(dy)}d`:dy===0?'⏰ hoje':dy<=3?`⏰ ${dy}d`:'📅 '+d.due}</span>`:'<span></span>'}
      <div class="kactions" onclick="event.stopPropagation()">
        ${ci>0?`<button class="kmove" onclick="moveDemand(${d.id},-1)">←</button>`:''}
        ${ci<COLS.length-1?`<button class="kmove" onclick="moveDemand(${d.id},1)">→</button>`:''}
        <button class="kmove" style="color:var(--red)" onclick="deleteDemand(${d.id})">✕</button>
      </div>
    </div>
  </div>`;
}

function moveDemand(id,dir){const d=gd(id);if(!d)return;const i=COLS.findIndex(c=>c.key===d.status);if(COLS[i+dir]){d.status=COLS[i+dir].key;save();renderKanban();}}
function deleteDemand(id){if(!confirm('Remover demanda?'))return;S.demands=S.demands.filter(d=>d.id!==id);save();renderKanban();}

function openDemandModal(id=null,defStatus='a_fazer'){
  const d=id?gd(id):null;
  const cOpts=S.clients.map(c=>`<option value="${c.id}" ${d&&d.clientId===c.id?'selected':''}>${c.name}</option>`).join('');
  const sOpts=COLS.map(col=>`<option value="${col.key}" ${(d?d.status:defStatus)===col.key?'selected':''}>${col.label}</option>`).join('');
  const pOpts=['urgente','normal','baixa'].map(p=>`<option value="${p}" ${d?d.priority===p?'selected':'':p==='normal'?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('');
  const eOpts=S.entries.map(e=>{const c=gc(e.clientId);const sv=gs(e.serviceId);const ck=(d&&d.entryIds&&d.entryIds.includes(e.id))?'checked':'';
    return`<label style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:12px;color:var(--text2)">
      <input type="checkbox" value="${e.id}" ${ck} style="width:auto">
      <span class="chip"><span class="chip-dot" style="background:${c.color}"></span>${c.name}</span>
      ${sv.name}${e.desc?' — '+e.desc:''}
      <span style="margin-left:auto;font-family:'DM Mono',monospace;font-size:11px">${fmt(e.price*e.qty)}</span>
    </label>`;}).join('');
  showModal(`
    <div class="modal-hd"><div class="modal-title">${d?'Editar':'Nova'} Demanda</div><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label>Título</label><input id="dm-title" value="${d?d.title:''}" placeholder="Ex: Pack redes sociais"></div>
    <div class="form-row f2">
      <div class="form-group"><label>Cliente</label><select id="dm-client">${cOpts}</select></div>
      <div class="form-group"><label>Status</label><select id="dm-status">${sOpts}</select></div>
    </div>
    <div class="form-row f2">
      <div class="form-group"><label>Prioridade</label><select id="dm-prio">${pOpts}</select></div>
      <div class="form-group"><label>Data de entrega</label><input type="date" id="dm-due" value="${d&&d.due?d.due:''}"></div>
    </div>
    <div class="form-group"><label>Descrição</label><textarea id="dm-desc" placeholder="Detalhes, referências, escopo...">${d?d.desc:''}</textarea></div>
    <div class="form-group">
      <label>Vincular lançamentos financeiros</label>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;max-height:160px;overflow-y:auto">
        ${S.entries.length?eOpts:'<span style="color:var(--text3);font-size:12px">Nenhum lançamento ainda.</span>'}
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="saveDemand(${d?d.id:'null'})">${d?'Salvar':'Criar'}</button>
    </div>`);
}

function saveDemand(id){
  const title=document.getElementById('dm-title').value.trim();
  if(!title){alert('Título obrigatório');return;}
  const obj={title,clientId:parseInt(document.getElementById('dm-client').value),status:document.getElementById('dm-status').value,priority:document.getElementById('dm-prio').value,due:document.getElementById('dm-due').value,desc:document.getElementById('dm-desc').value.trim(),entryIds:[...document.querySelectorAll('#modal-container input[type=checkbox]:checked')].map(el=>parseInt(el.value))};
  if(id&&id!=='null'){Object.assign(gd(id),obj);}else{S.demands.push({id:uid(),...obj});}
  save();closeModal();renderKanban();
}

function openDemandDetail(id){
  const d=gd(id);if(!d)return;
  const c=gc(d.clientId);
  const colLabel=COLS.find(col=>col.key===d.status)?.label||d.status;
  const les=(d.entryIds||[]).map(eid=>S.entries.find(e=>e.id===eid)).filter(Boolean);
  const lt=les.reduce((s,e)=>s+e.price*e.qty,0);
  showModal(`
    <div class="modal-hd"><div class="modal-title">${d.title}</div><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
      <span class="chip"><span class="chip-dot" style="background:${c.color}"></span>${c.name}</span>
      <span class="badge b-gray">${colLabel}</span>
      <span class="badge ${d.priority==='urgente'?'b-red':d.priority==='normal'?'b-yellow':'b-gray'}">${d.priority}</span>
      ${d.due?`<span class="badge b-gray">📅 ${d.due}</span>`:''}
    </div>
    ${d.desc?`<p style="color:var(--text2);font-size:12.5px;line-height:1.6;margin-bottom:16px">${d.desc}</p>`:''}
    ${les.length?`<div><label style="margin-bottom:8px">Lançamentos vinculados</label>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Serviço</th><th>Qtd</th><th>Total</th><th>Status</th></tr></thead>
        <tbody>${les.map(e=>{const sv=gs(e.serviceId);return`<tr>
          <td>${sv.name}${e.desc?` <span style="color:var(--text3)">— ${e.desc}</span>`:''}</td>
          <td>${e.qty}</td>
          <td style="font-family:'DM Mono',monospace">${fmt(e.price*e.qty)}</td>
          <td><span class="badge ${e.status==='recebido'?'b-green':'b-yellow'}" style="cursor:pointer" onclick="toggleES(${e.id});closeModal();openDemandDetail(${d.id})">${e.status==='recebido'?'Recebido':'Pendente'}</span></td>
        </tr>`}).join('')}
        <tr><td colspan="2" style="color:var(--text3);font-size:10px">Total vinculado</td><td colspan="2" style="font-family:'DM Mono',monospace;color:var(--accent);font-weight:700">${fmt(lt)}</td></tr>
        </tbody></table></div></div>`:''}
    <div class="modal-ft">
      <button class="btn btn-danger" onclick="deleteDemand(${d.id});closeModal()">Remover</button>
      <button class="btn" onclick="closeModal()">Fechar</button>
      <button class="btn btn-accent" onclick="closeModal();openDemandModal(${d.id})">Editar</button>
    </div>`);
}

function renderFinanceiro(){
  const total=S.entries.reduce((s,e)=>s+e.price*e.qty,0);
  const rec=S.entries.filter(e=>e.status==='recebido').reduce((s,e)=>s+e.price*e.qty,0);
  const pend=total-rec;
  document.getElementById('fin-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total gerado</div><div class="stat-val accent">${fmt(total)}</div></div>
    <div class="stat-card"><div class="stat-label">Recebido</div><div class="stat-val green">${fmt(rec)}</div></div>
    <div class="stat-card"><div class="stat-label">A receber</div><div class="stat-val red">${fmt(pend)}</div></div>
    <div class="stat-card"><div class="stat-label">Lançamentos</div><div class="stat-val blue">${S.entries.length}</div></div>`;

  const fc=document.getElementById('filter-client').value;
  const fs=document.getElementById('filter-status').value;
  document.getElementById('filter-client').innerHTML='<option value="">Todos clientes</option>'+S.clients.map(c=>`<option value="${c.id}" ${fc==c.id?'selected':''}>${c.name}</option>`).join('');

  let list=S.entries.filter(e=>(!fc||e.clientId===parseInt(fc)));
  const groups={};
  list.forEach(e=>{if(!groups[e.clientId])groups[e.clientId]={clientId:e.clientId,entries:[]};groups[e.clientId].entries.push(e);});
  let cg=Object.values(groups);
  if(fs)cg=cg.map(g=>({...g,entries:g.entries.filter(e=>e.status===fs)})).filter(g=>g.entries.length);
  if(!cg.length){document.getElementById('entries-table').innerHTML='<div class="empty-state">Nenhum lançamento.</div>';return;}
  cg.sort((a,b)=>b.entries.map(e=>e.date).sort().reverse()[0].localeCompare(a.entries.map(e=>e.date).sort().reverse()[0]));

  let html=`<div class="tbl-wrap"><table>
    <thead><tr><th></th><th>Cliente</th><th>Serviços</th><th>Total</th><th>A receber</th><th>Status</th><th></th></tr></thead><tbody>`;
  cg.forEach(g=>{
    const c=gc(g.clientId);
    const tot=g.entries.reduce((s,e)=>s+e.price*e.qty,0);
    const p=g.entries.filter(e=>e.status==='pendente').reduce((s,e)=>s+e.price*e.qty,0);
    const allR=g.entries.every(e=>e.status==='recebido');
    const allP=g.entries.every(e=>e.status==='pendente');
    const isOpen=!!expanded[g.clientId];
    const svcs=[...new Set(g.entries.map(e=>gs(e.serviceId).name))].join(', ');
    const dems=S.demands.filter(d=>d.status!=='concluido'&&d.clientId===g.clientId);
    html+=`<tr class="grow" onclick="toggleExpand(${g.clientId})">
      <td style="width:28px"><span class="xbtn ${isOpen?'open':''}"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 4l4 4-4 4"/></svg></span></td>
      <td>
        <span class="chip"><span class="chip-dot" style="background:${c.color}"></span>${c.name}</span>
        ${dems.length?`<span class="linked-badge" style="margin-left:5px" onclick="event.stopPropagation();goPage('kanban',document.querySelectorAll('.nav-item')[1])">⬡ ${dems.length} demanda${dems.length>1?'s':''}</span>`:''}
      </td>
      <td style="color:var(--text3);font-size:11px">${svcs}</td>
      <td style="font-family:'DM Mono',monospace;font-weight:600">${fmt(tot)}</td>
      <td style="font-family:'DM Mono',monospace;color:${p>0?'var(--red)':'var(--text3)'}">${p>0?fmt(p):'—'}</td>
      <td><span class="badge ${allR?'b-green':allP?'b-yellow':'b-blue'}">${allR?'Recebido':allP?'Pendente':'Parcial'}</span></td>
      <td><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteClientEntries(${g.clientId})">Remover</button></td>
    </tr>
    <tr id="detail-${g.clientId}" style="display:${isOpen?'table-row':'none'}">
      <td colspan="7" style="padding:0;background:var(--bg)">
        <div style="padding:8px 14px 14px 42px">
          <table><thead><tr><th>Data</th><th>Serviço</th><th>Qtd</th><th>Unit.</th><th>Total</th><th>Status</th><th></th></tr></thead>
          <tbody>${g.entries.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{const sv=gs(e.serviceId);return`<tr>
            <td style="font-size:11px;color:var(--text3)">${e.date}</td>
            <td>${sv.name}${e.desc?` <span style="color:var(--text3)">— ${e.desc}</span>`:''}</td>
            <td>${e.qty}</td>
            <td style="font-family:'DM Mono',monospace">${fmt(e.price)}</td>
            <td style="font-family:'DM Mono',monospace;font-weight:600">${fmt(e.price*e.qty)}</td>
            <td><span class="badge ${e.status==='recebido'?'b-green':'b-yellow'}" style="cursor:pointer" onclick="toggleES(${e.id})">${e.status==='recebido'?'Recebido':'Pendente'}</span></td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteEntry(${e.id})">✕</button></td>
          </tr>`}).join('')}</tbody></table>
        </div>
      </td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  document.getElementById('entries-table').innerHTML=html;
  renderSidebar();
}

function toggleExpand(cid){
  expanded[cid]=!expanded[cid];
  const det=document.getElementById('detail-'+cid);
  if(det)det.style.display=expanded[cid]?'table-row':'none';
  const row=det?.previousElementSibling;
  if(row){const b=row.querySelector('.xbtn');if(b)b.classList.toggle('open',expanded[cid]);}
}
function toggleES(id){const e=S.entries.find(x=>x.id===id);if(e){e.status=e.status==='recebido'?'pendente':'recebido';save();renderFinanceiro();}}
function deleteEntry(id){S.entries=S.entries.filter(e=>e.id!==id);S.demands.forEach(d=>{if(d.entryIds)d.entryIds=d.entryIds.filter(i=>i!==id)});save();renderFinanceiro();}
function deleteClientEntries(cid){const c=gc(cid);if(!confirm(`Remover lançamentos de ${c.name}?`))return;const ids=S.entries.filter(e=>e.clientId===cid).map(e=>e.id);S.entries=S.entries.filter(e=>e.clientId!==cid);S.demands.forEach(d=>{if(d.entryIds)d.entryIds=d.entryIds.filter(i=>!ids.includes(i))});save();renderFinanceiro();}

function openEntryModal(){
  const cOpts=S.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  const sOpts=S.services.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  showModal(`
    <div class="modal-hd"><div class="modal-title">Novo Lançamento</div><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <div class="form-row f2">
      <div class="form-group"><label>Cliente</label><select id="en-client" onchange="fillPrice()">${cOpts}</select></div>
      <div class="form-group"><label>Serviço</label><select id="en-service" onchange="fillPrice()">${sOpts}</select></div>
    </div>
    <div class="form-row f3">
      <div class="form-group"><label>Qtd</label><input type="number" id="en-qty" value="1" min="1"></div>
      <div class="form-group"><label>Valor unit. (R$)</label><input type="number" id="en-price" placeholder="0,00"></div>
      <div class="form-group"><label>Data</label><input type="date" id="en-date" value="${new Date().toISOString().split('T')[0]}"></div>
    </div>
    <div class="form-row f2">
      <div class="form-group"><label>Status</label><select id="en-status"><option value="pendente">Pendente</option><option value="recebido">Recebido</option></select></div>
      <div class="form-group"><label>Descrição</label><input id="en-desc" placeholder="Opcional"></div>
    </div>
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="saveEntry()">Adicionar</button>
    </div>`);
  fillPrice();
}

function fillPrice(){
  const cid=parseInt(document.getElementById('en-client')?.value);
  const sid=parseInt(document.getElementById('en-service')?.value);
  if(!cid||!sid)return;
  const cp=(S.clientPrices||[]).find(p=>p.clientId===cid&&p.serviceId===sid);
  const el=document.getElementById('en-price');
  if(el)el.value=cp?cp.price:gs(sid).price;
}

function saveEntry(){
  const clientId=parseInt(document.getElementById('en-client').value);
  const serviceId=parseInt(document.getElementById('en-service').value);
  const qty=parseInt(document.getElementById('en-qty').value)||1;
  const price=parseFloat(document.getElementById('en-price').value)||0;
  if(!price){alert('Informe o valor.');return;}
  S.entries.push({id:uid(),clientId,serviceId,qty,price,status:document.getElementById('en-status').value,date:document.getElementById('en-date').value,desc:document.getElementById('en-desc').value.trim()});
  expanded[clientId]=true;
  save();closeModal();renderFinanceiro();
}

function renderClientes(){
  const el=document.getElementById('clients-grid');
  if(!S.clients.length){el.innerHTML='<div class="empty-state">Nenhum cliente.</div>';return;}
  el.innerHTML=`<div class="client-grid">${S.clients.map(c=>{
    const entries=S.entries.filter(e=>e.clientId===c.id);
    const pend=entries.filter(e=>e.status==='pendente').reduce((s,e)=>s+e.price*e.qty,0);
    const openDems=S.demands.filter(d=>d.clientId===c.id&&d.status!=='concluido').length;
    const links=(c.links||'').split('\n').filter(l=>l.trim());
    return`<div class="ccard">
      <div class="ccard-top">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0;display:inline-block"></span>
          <div class="ccard-name">${c.name}</div>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${c.contract?`<span class="contract-badge ${c.contractStatus==='ativo'?'':'paused'}">${c.contractStatus==='ativo'?'● Mensal':'○ Pausado'} ${fmt(c.contractValue||0)}/mês</span>`:''}
          ${openDems>0?`<span class="badge b-blue">${openDems} demanda${openDems>1?'s':''}</span>`:''}
          ${pend>0?`<span class="badge b-red">A receber ${fmt(pend)}</span>`:''}
        </div>
      </div>
      <div class="ccard-body">
        ${c.email?`<div class="ccard-row"><span class="crow-label">Email</span><span class="crow-val">${c.email}</span></div>`:''}
        ${c.phone?`<div class="ccard-row"><span class="crow-label">Tel</span><span class="crow-val">${c.phone}</span></div>`:''}
        ${c.briefing?`<div class="ccard-row"><span class="crow-label">Briefing</span><span class="crow-val">${c.briefing}</span></div>`:''}
        ${links.length?`<div class="ccard-row"><span class="crow-label">Links</span><span class="crow-val">${links.map(l=>`<a href="${l.startsWith('http')?l:'https://'+l}" target="_blank">${l.length>38?l.slice(0,38)+'…':l}</a>`).join('<br>')}</span></div>`:''}
        ${c.notes?`<div class="ccard-row"><span class="crow-label">Obs.</span><span class="crow-val">${c.notes}</span></div>`:''}
        ${!c.email&&!c.phone&&!c.briefing&&!links.length&&!c.notes?`<div style="color:var(--text3);font-size:11px">Nenhuma informação cadastrada.</div>`:''}
      </div>
      <div class="ccard-ft">
        <button class="btn btn-sm" onclick="openClientModal(${c.id})">Editar</button>
        <button class="btn btn-sm" onclick="openPriceModal(${c.id})">Preços</button>
        <button class="btn btn-sm btn-danger" onclick="deleteClient(${c.id})">Remover</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function openClientModal(id=null){
  const c=id?gc(id):{name:'',color:'#ff6b1a',email:'',phone:'',briefing:'',links:'',notes:'',contract:false,contractValue:0,contractStatus:'ativo'};
  showModal(`
    <div class="modal-hd"><div class="modal-title">${id?'Editar':'Novo'} Cliente</div><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <div class="form-row f2">
      <div class="form-group"><label>Nome</label><input id="cl-name" value="${c.name}" placeholder="Nome do cliente"></div>
      <div class="form-group"><label>Cor</label><input type="color" id="cl-color" value="${c.color}"></div>
    </div>
    <div class="form-row f2">
      <div class="form-group"><label>Email</label><input id="cl-email" value="${c.email||''}" placeholder="email@cliente.com"></div>
      <div class="form-group"><label>Telefone / WhatsApp</label><input id="cl-phone" value="${c.phone||''}" placeholder="(51) 99999-9999"></div>
    </div>
    <div class="form-group"><label>Briefing / Sobre o cliente</label><textarea id="cl-briefing" placeholder="Nicho, estilo, público-alvo, referências...">${c.briefing||''}</textarea></div>
    <div class="form-group"><label>Links úteis (um por linha)</label><textarea id="cl-links" placeholder="https://instagram.com/cliente&#10;https://site.com.br&#10;https://drive.google.com/...">${c.links||''}</textarea></div>
    <div class="form-group"><label>Observações internas</label><textarea id="cl-notes" placeholder="Notas, preferências de horário, lembretes...">${c.notes||''}</textarea></div>
    <div class="divider"></div>
    <div style="font-size:12px;font-weight:700;margin-bottom:12px;color:var(--accent);letter-spacing:.02em">Contrato Mensal Recorrente</div>
    <div class="form-row f3">
      <div class="form-group" style="display:flex;align-items:center;gap:8px;padding-top:18px">
        <input type="checkbox" id="cl-contract" ${c.contract?'checked':''} style="width:auto">
        <label style="margin:0;text-transform:none;letter-spacing:0;font-size:12px;color:var(--text2)">Ativar</label>
      </div>
      <div class="form-group"><label>Valor mensal (R$)</label><input type="number" id="cl-cval" value="${c.contractValue||''}" placeholder="0,00"></div>
      <div class="form-group"><label>Status</label><select id="cl-cstatus"><option value="ativo" ${(!c.contractStatus||c.contractStatus==='ativo')?'selected':''}>Ativo</option><option value="pausado" ${c.contractStatus==='pausado'?'selected':''}>Pausado</option></select></div>
    </div>
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="saveClient(${id||'null'})">${id?'Salvar':'Criar'}</button>
    </div>`);
}

function saveClient(id){
  const name=document.getElementById('cl-name').value.trim();
  if(!name)return;
  const obj={name,color:document.getElementById('cl-color').value,email:document.getElementById('cl-email').value.trim(),phone:document.getElementById('cl-phone').value.trim(),briefing:document.getElementById('cl-briefing').value.trim(),links:document.getElementById('cl-links').value.trim(),notes:document.getElementById('cl-notes').value.trim(),contract:document.getElementById('cl-contract').checked,contractValue:parseFloat(document.getElementById('cl-cval').value)||0,contractStatus:document.getElementById('cl-cstatus').value};
  if(id&&id!=='null'){Object.assign(gc(id),obj);}else{S.clients.push({id:uid(),...obj});}
  save();closeModal();renderClientes();renderSidebar();
}

function deleteClient(id){
  const c=gc(id);if(!confirm(`Remover ${c.name} e todos os dados?`))return;
  S.clients=S.clients.filter(c=>c.id!==id);
  S.entries=S.entries.filter(e=>e.clientId!==id);
  S.demands=S.demands.filter(d=>d.clientId!==id);
  S.clientPrices=(S.clientPrices||[]).filter(p=>p.clientId!==id);
  save();renderClientes();renderSidebar();
}

function openPriceModal(cid){
  const c=gc(cid);
  showModal(`
    <div class="modal-hd"><div class="modal-title">Preços — ${c.name}</div><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <p style="color:var(--text2);font-size:12px;margin-bottom:14px">Valores personalizados para este cliente. Deixe igual ao padrão se não houver diferença.</p>
    ${S.services.map(s=>{const cp=(S.clientPrices||[]).find(p=>p.clientId===cid&&p.serviceId===s.id);return`<div class="form-group"><label>${s.name} <span style="color:var(--text3)">(padrão: R$ ${s.price})</span></label><input type="number" value="${cp?cp.price:s.price}" data-sid="${s.id}"></div>`;}).join('')}
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="saveClientPrices(${cid})">Salvar</button>
    </div>`);
}

function saveClientPrices(cid){
  if(!S.clientPrices)S.clientPrices=[];
  S.clientPrices=S.clientPrices.filter(p=>p.clientId!==cid);
  document.querySelectorAll('#modal-container [data-sid]').forEach(inp=>S.clientPrices.push({clientId:cid,serviceId:parseInt(inp.dataset.sid),price:parseFloat(inp.value)||0}));
  save();closeModal();renderClientes();
}

function renderServicos(){
  document.getElementById('services-list').innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>Serviço</th><th>Preço padrão</th><th>Lançamentos</th><th></th></tr></thead>
    <tbody>${S.services.map(s=>`<tr>
      <td style="font-weight:600">${s.name}</td>
      <td><input type="number" value="${s.price}" style="width:110px" onchange="updSvc(${s.id},this.value)"></td>
      <td>${S.entries.filter(e=>e.serviceId===s.id).length}</td>
      <td><button class="btn btn-sm btn-danger" onclick="delSvc(${s.id})">Remover</button></td>
    </tr>`).join('')}${!S.services.length?'<tr><td colspan="4" class="empty-state">Nenhum serviço.</td></tr>':''}</tbody></table></div>`;
}

function openServiceModal(){
  showModal(`
    <div class="modal-hd"><div class="modal-title">Novo Serviço</div><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <div class="form-row f2">
      <div class="form-group"><label>Nome</label><input id="sv-name" placeholder="Ex: Arte, Web Design..."></div>
      <div class="form-group"><label>Preço padrão (R$)</label><input type="number" id="sv-price" placeholder="0,00"></div>
    </div>
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="saveSvc()">Criar</button>
    </div>`);
}
function saveSvc(){const n=document.getElementById('sv-name').value.trim();if(!n)return;S.services.push({id:uid(),name:n,price:parseFloat(document.getElementById('sv-price').value)||0});save();closeModal();renderServicos();}
function updSvc(id,v){const s=S.services.find(x=>x.id===id);if(s){s.price=parseFloat(v)||0;save();}}
function delSvc(id){if(!confirm('Remover serviço?'))return;S.services=S.services.filter(s=>s.id!==id);save();renderServicos();}

function showModal(html){document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="if(event.target.classList.contains('modal-overlay'))closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-container').innerHTML='';}

// ── AUTH ─────────────────────────────────────────────────────────────────────
const PASSWORD_HASH='323ef810dd19f40b77e63de99e457a172a477d36f3affd41305dd81deadc33a0';
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,'0')).join('');}

function showLogin(){
  document.querySelector('.shell').style.display='none';
  document.getElementById('alert-area').style.display='none';
  const el=document.createElement('div');el.id='login-screen';
  el.innerHTML=`<style>
    #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
    .lbox{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:40px 36px;width:340px;text-align:center}
    .lmark{font-size:22px;font-weight:700;margin-bottom:2px}.lmark span{color:var(--accent)}
    .lsub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.06em;margin-bottom:28px}
    .lbar{width:32px;height:2px;background:var(--accent);margin:0 auto 26px;border-radius:2px;animation:lp 2s ease-in-out infinite}
    @keyframes lp{0%,100%{opacity:.2;width:20px}50%{opacity:1;width:40px}}
    .lbox input{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px 14px;font-size:14px;width:100%;margin-bottom:10px;font-family:'Syne',sans-serif;text-align:center;letter-spacing:3px}
    .lbox input:focus{outline:none;border-color:rgba(255,107,26,.5)}
    .lbtn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif}
    .lbtn:hover{background:var(--accent2)}
    .lerr{font-size:12px;color:var(--red);margin-top:8px;min-height:18px}
  </style>
  <div class="lbox">
    <div class="lmark">Freelance<span>Hub</span></div>
    <div class="lsub">acesso restrito</div>
    <div class="lbar"></div>
    <input type="password" id="l-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="lbtn" onclick="tryLogin()">Entrar</button>
    <div class="lerr" id="l-err"></div>
  </div>`;
  document.body.appendChild(el);
  setTimeout(()=>document.getElementById('l-input')?.focus(),100);
}

async function tryLogin(){
  const v=document.getElementById('l-input').value;
  const h=await sha256(v);
  if(h===PASSWORD_HASH){
    sessionStorage.setItem('flhub_auth','1');
    document.getElementById('login-screen').remove();
    document.querySelector('.shell').style.display='flex';
    document.getElementById('alert-area').style.display='';
    renderDashboard();
  }else{
    const e=document.getElementById('l-err');e.textContent='Senha incorreta.';
    document.getElementById('l-input').value='';document.getElementById('l-input').focus();
    setTimeout(()=>e.textContent='',2500);
  }
}

if(sessionStorage.getItem('flhub_auth')==='1'){renderDashboard();}
else{showLogin();}
</script>
</body>
</html>
