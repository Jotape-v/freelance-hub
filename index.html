<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UmiDesk</title>

<style>
:root {
  --bg: #0f0f0f; --bg2: #181818; --bg3: #222222; --bg4: #2a2a2a;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f0f0f0; --text2: #888; --text3: #555;
  
  --accent: #ff8a00; 
  --accent-dim: rgba(255, 138, 0, 0.12); 
  --accent-text: #ffffff; 
  
  --red: #ff5c5c; --red-dim: rgba(255,92,92,0.1);
  --yellow: #ffd166; --yellow-dim: rgba(255,209,102,0.1);
  --blue: #5c9eff; --blue-dim: rgba(92,158,255,0.1);
  --green: #5cffa0; --green-dim: rgba(92,255,160,0.1);
  --radius: 10px; --radius-sm: 6px;
  font-family: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

/* Ocultar Valores */
.hide-values .val-money { filter: blur(5px); opacity: 0.7; pointer-events: none; user-select: none; }

/* Layout & Utils */
.shell { display: flex; min-height: 100vh; }
.sidebar { width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; z-index: 1000; transition: transform 0.3s ease; }
.main { flex: 1; overflow: auto; position: relative; width: 100%; }
.sync-badge { position: absolute; top: 12px; right: 36px; font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; z-index: 10; transition: all 0.3s; }
.sync-badge.syncing { color: var(--yellow); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.syncing .sync-dot { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0% { opacity: .5; } 50% { opacity: 1; } 100% { opacity: .5; } }

/* Sidebar & Mobile Overlay */
.logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
.logo-mark { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
.logo-mark span { color: var(--accent); }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 400; transition: all .15s; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.nav-section { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; padding: 16px 10px 6px; font-family: 'DM Mono', monospace; }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }

/* Mobile Header */
.mobile-header { display: none; background: var(--bg2); padding: 16px 20px; border-bottom: 1px solid var(--border); align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 900; }
.mobile-header-logo { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
.mobile-header-logo span { color: var(--accent); }
.mobile-menu-btn { background: none; border: none; color: var(--text); padding: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.mobile-menu-btn svg { width: 24px; height: 24px; }
.sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 990; backdrop-filter: blur(2px); transition: opacity 0.3s; opacity: 0; pointer-events: none; }

/* Pages */
.page { display: none; padding: 32px 36px; }
.page.active { display: block; }
.page-header { margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-start; }
.page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.page-title-home { font-size: 26px; font-weight: 500; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
.page-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }

/* Cards & Grid */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
.home-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; font-family: 'DM Mono', monospace; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.stat-val { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; letter-spacing: -1px; }
.val-accent { color: var(--accent); } .val-green { color: var(--green); } .val-red { color: var(--red); } .val-blue { color: var(--blue); } .val-yellow { color: var(--yellow); }

/* UI Elements */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg3); color: var(--text); cursor: pointer; font-size: 13px; transition: all .15s; justify-content: center;}
.btn:hover { background: var(--bg4); border-color: var(--border2); }
.btn-accent { background: var(--accent); color: var(--accent-text); border-color: transparent; font-weight: 600; }
.btn-accent:hover { opacity: 0.9; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-danger { background: transparent; border-color: transparent; color: var(--red); }
.btn-danger:hover { background: var(--red-dim); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Forms & Tables */
input, select, textarea { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; width: 100%; transition: border .15s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; font-family: 'DM Mono', monospace; }
.form-group { margin-bottom: 14px; }
.form-row { display: grid; gap: 12px; } .form-row-2 { grid-template-columns: 1fr 1fr; } .form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
.table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; background: var(--bg2); white-space: nowrap; }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 13px; }
.chip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px 2px 5px; border-radius: 20px; font-size: 11px; background: var(--bg4); border: 1px solid var(--border); white-space: nowrap; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge::before { content:''; width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.badge-green { background: var(--green-dim); color: var(--green); } .badge-green::before { background: var(--green); }
.badge-red { background: var(--red-dim); color: var(--red); } .badge-red::before { background: var(--red); }
.badge-yellow { background: var(--yellow-dim); color: var(--yellow); } .badge-yellow::before { background: var(--yellow); }
